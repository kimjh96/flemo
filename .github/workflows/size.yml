name: Size

on:
  pull_request:
    branches: [main]

concurrency:
  group: size-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  size:
    name: Bundle-size budget
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.16.0
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # `andresz1/size-limit-action` reads `.size-limit.cjs` at the repo root,
      # computes the delta against the PR base (main), and posts (or updates)
      # a single comment with the per-package result. `skip_step: install`
      # because we already installed above; `build_script: build:packages`
      # skips `@flemo/web` so the bundle-size job stays focused on the
      # published surface.
      # Pinned to the v1 commit SHA per GitHub's security hardening guidance:
      # `@v1` is a mutable tag, so a retag (or upstream compromise) would let
      # the action execute different code with this job's `pull-requests:
      # write` scope. Renovate updates the pinned SHA via `pinDigests`.
      - name: Size limit
        uses: andresz1/size-limit-action@e7493a72a44b113341c0cf6186ab49c17c4b65c1 # v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          skip_step: install
          build_script: build:packages
