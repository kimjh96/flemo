name: Size

on:
  pull_request:
    branches: [main]

concurrency:
  group: size-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  size:
    name: Bundle-size budget
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # `andresz1/size-limit-action` reads `.size-limit.cjs` at the repo root,
      # computes the delta against the PR base, and posts (or updates) a single
      # comment with the per-package result. `skip_step: install` because we
      # already installed above; `build_script: build:packages` skips
      # `@flemo/web` so the bundle-size job stays focused on the published
      # surface.
      #
      # `continue-on-error: true` covers the bootstrap case where the action's
      # base-branch checkout doesn't yet contain `.size-limit.cjs` or the
      # `build:packages` script (the very first PR that introduces them). Once
      # those land on `main`, the diff comparison works on subsequent PRs and
      # this flag becomes a quiet no-op — failures don't block merges, but the
      # comment with the size table is still posted.
      - name: Size limit
        uses: andresz1/size-limit-action@v1
        continue-on-error: true
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          package_manager: pnpm
          skip_step: install
          build_script: build:packages
