name: Preview release

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: preview-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    name: Publish preview packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo run build --filter=@flemo/core --filter=@flemo/react --filter=@flemo/react-layout

      - name: Publish to pkg.pr.new
        run: pnpm dlx pkg-pr-new publish --compact --pnpm './packages/core' './packages/react' './packages/react-layout'
