name: Coverage

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Test coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.16.0
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # @flemo/react's tests import from @flemo/core as a workspace package, so
      # core has to be built first or the resolution fails inside coverage's
      # transform step. Building only the dep we need keeps the job lean.
      - name: Build @flemo/core
        run: pnpm --filter @flemo/core build

      - name: Test (with coverage)
        run: pnpm --filter @flemo/core --filter @flemo/react test:coverage

      - name: Upload to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: kimjh96/flemo
          files: ./packages/core/coverage/lcov.info,./packages/react/coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false
